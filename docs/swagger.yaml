        name: page
        type: integer
      - description: Page size
        in: query
        name: limit
        type: integer
      - description: Search username or email
        in: query
        name: search
        type: string
      - description: Filter by role
        in: query
        name: role
        type: string
      - description: Filter by status
        in: query
        name: status
        type: string
