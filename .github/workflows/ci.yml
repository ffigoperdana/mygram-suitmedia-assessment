name: CI

on:
  pull_request:
  push:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  GO_VERSION: "1.26.x"
  NODE_VERSION: "24"

jobs:
  backend-static-analysis:
    name: backend-static-analysis
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: go.sum

      - name: Verify formatting
        shell: bash
        run: |
          mapfile -t go_files < <(git ls-files '*.go')
          unformatted="$(gofmt -l "${go_files[@]}")"
          if [[ -n "$unformatted" ]]; then
            printf 'The following files need gofmt:\n%s\n' "$unformatted"
            exit 1
          fi

      - name: Run go vet
        run: go vet ./...

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.11.4
          args: --timeout=5m

  frontend-static-analysis:
    name: frontend-static-analysis
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mygram-frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: mygram-frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

  backend-unit-test:
    name: backend-unit-test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: go.sum

      - name: Run database-independent unit tests with race detector
        env:
          GIN_MODE: test
          CAP_ENABLED: "false"
        run: >-
          go test -count=1 -race -covermode=atomic -coverpkg=./... -coverprofile=coverage-unit.out ./...
          -run '^(Test(HealthEndpointsWithoutDatabase|CORSPreflight|SecurityHeaders|PublicOpenAPISpecFiltersAdminAndLegacyRoutes|SwaggerUI(CanBeDisabled|AllowsSameOriginEmbedding)|MediaProxyRejectsInvalidPathsAndRequiresStorage|VerifyCaptcha.*|ValidateSocialProfileURL))$'

      - name: Print unit-test coverage
        run: go tool cover -func=coverage-unit.out

      - name: Upload unit-test coverage
        uses: actions/upload-artifact@v6
        with:
          name: backend-unit-coverage
          path: coverage-unit.out
          if-no-files-found: error
          retention-days: 14

  backend-integration-test:
    name: backend-integration-test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: finalproject_test
          POSTGRES_USER: postgres
          POSTGRES_HOST_AUTH_METHOD: trust
        options: >-
          --health-cmd "pg_isready -U postgres -d finalproject_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    env:
      GIN_MODE: test
      DB_HOST: localhost
      DB_USER: postgres
      DB_PASSWORD: unused
      DB_NAME: finalproject_test
      DB_PORT: "5432"
      DB_SSLMODE: disable
      REQUIRE_TEST_DATABASE: "true"
      CAP_ENABLED: "false"
      S3_ENDPOINT: ""
      S3_BUCKET: ""
      S3_ACCESS_KEY_ID: ""
      S3_SECRET_ACCESS_KEY: ""
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: go.sum

      - name: Generate ephemeral JWT signing key
        shell: bash
        run: echo "JWT_SECRET=$(openssl rand -hex 32)" >> "$GITHUB_ENV"

      - name: Run PostgreSQL-backed integration tests
        run: >-
          go test -count=1 -covermode=atomic -coverpkg=./... -coverprofile=coverage-integration.out .
          -run '^(Test(UserRegistrationLoginAndValidation|AuthenticationMiddleware|CurrentUserAndAdminRBAC|PushSubscriptionRoutes|PhotoEndpointsAndOwnership|PhotoImageUploadValidationAndStorageConfig|CommentEndpointsAndOwnership|SocialMediaEndpointsAndOwnership|ReadinessWithDatabase))$'

      - name: Print integration-test coverage
        run: go tool cover -func=coverage-integration.out

      - name: Upload integration-test coverage
        uses: actions/upload-artifact@v6
        with:
          name: backend-integration-coverage
          path: coverage-integration.out
          if-no-files-found: error
          retention-days: 14

  frontend-unit-test:
    name: frontend-unit-test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mygram-frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: mygram-frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run frontend unit tests
        run: npm run test

  end-to-end-test:
    name: end-to-end-test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: finalproject_e2e
          POSTGRES_USER: postgres
          POSTGRES_HOST_AUTH_METHOD: trust
        options: >-
          --health-cmd "pg_isready -U postgres -d finalproject_e2e"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    env:
      GIN_MODE: test
      DB_HOST: localhost
      DB_USER: postgres
      DB_PASSWORD: unused
      DB_NAME: finalproject_e2e
      DB_PORT: "5432"
      DB_SSLMODE: disable
      CORS_ALLOWED_ORIGINS: http://127.0.0.1:3000
      CAP_ENABLED: "false"
      PUBLIC_OPENAPI_ENABLED: "true"
      SWAGGER_UI_MODE: internal
      S3_ENDPOINT: ""
      S3_BUCKET: ""
      S3_ACCESS_KEY_ID: ""
      S3_SECRET_ACCESS_KEY: ""
      VITE_API_BASE_URL: http://127.0.0.1:8080
      VITE_CAP_ENABLED: "false"
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: go.sum

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: mygram-frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: mygram-frontend
        run: npm ci

      - name: Install Playwright Chromium and system dependencies
        working-directory: mygram-frontend
        run: npx playwright install --with-deps chromium

      - name: Run mocked UI browser suite
        working-directory: mygram-frontend
        run: npm run test:e2e:mocked

      - name: Generate ephemeral JWT signing key
        shell: bash
        run: echo "JWT_SECRET=$(openssl rand -hex 32)" >> "$GITHUB_ENV"

      - name: Build and start real API stack
        shell: bash
        run: |
          go build -o /tmp/mygram-api .
          nohup /tmp/mygram-api >/tmp/mygram-api.log 2>&1 &
          for _ in {1..30}; do
            if curl --fail --silent http://127.0.0.1:8080/health/ready >/dev/null; then
              exit 0
            fi
            sleep 1
          done
          cat /tmp/mygram-api.log
          exit 1

      - name: Run real-stack browser smoke test
        working-directory: mygram-frontend
        run: npm run test:e2e:real

      - name: Upload Playwright reports on failure
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: playwright-report
          path: |
            mygram-frontend/playwright-report/
            mygram-frontend/test-results/
            /tmp/mygram-api.log
          if-no-files-found: warn
          retention-days: 14

  docker-build:
    name: docker-build
    runs-on: ubuntu-latest
    needs:
      - backend-static-analysis
      - frontend-static-analysis
      - backend-unit-test
      - backend-integration-test
      - frontend-unit-test
      - end-to-end-test
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build backend image without pushing
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: mygram-api:ci
          cache-from: type=gha,scope=backend
          cache-to: type=gha,scope=backend,mode=max

      - name: Build frontend image without pushing
        uses: docker/build-push-action@v7
        with:
          context: ./mygram-frontend
          file: ./mygram-frontend/Dockerfile
          push: false
          tags: mygram-web:ci
          build-args: |
            VITE_API_BASE_URL=http://127.0.0.1:8080
            VITE_CAP_ENABLED=false
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,scope=frontend,mode=max
